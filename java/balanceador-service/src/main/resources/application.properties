server.port=8080
server.address=0.0.0.0
spring.application.name=balanceador-service

# Base de datos SQLite
spring.datasource.url=jdbc:sqlite:nodos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Nodos (valores por defecto para localhost)
# IP de la Máquina 4 (Servidor de Pagos 1, puerto 9001)
pagos1.url=http://127.0.0.1:9001/
# IP de la Máquina 5 (Servidor de Pagos 2, puerto 9002)
pagos2.url=http://127.0.0.1:9002/
 
# Tiempos (ms)
heartbeat.interval=1000
heartbeat.timeout=1000
http.timeout=2000
